<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Bank | Login</title>
    <style>
        body { background-color: #001f3f; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #333; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #e1e4e8; border-radius: 10px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 12px; border: none; border-radius: 10px; background: #007bff; color: white; font-weight: 600; cursor: pointer; margin-top: 15px; }
        /* Error message style for WRONG password only */
        .error { color: #721c24; background-color: #f8d7da; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🏦 Global Bank</h2>
        
        {% if messages %}
            {% for message in messages %}
                {% if message.tags == 'error' %}
                    <div class="error">{{ message }}</div>
                {% endif %}
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="account_no" placeholder="Account Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-login">Access Account</button>
        </form>
    </div>
</body>
</html>
